<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>超級百貨 Online</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <section id="home" class="screen active hero">
      <div class="mall-glow"></div>
      <h1>超級百貨 <span>Online</span></h1>
      <p>原版桌遊 × 豪華手機遊戲融合版</p>
      <div class="glass login-card">
        <label>玩家名稱</label>
        <input id="playerName" maxlength="10" placeholder="例如：佩佩" />
        <button id="createRoomBtn">🏠 建立房間</button>
        <div class="join-row">
          <input id="roomCodeInput" maxlength="6" placeholder="輸入房號" />
          <button id="joinRoomBtn">🔑 加入</button>
        </div>
        <button id="rulesBtn" class="ghost">📖 遊戲規則</button>
      </div>
    </section>

    <section id="game" class="screen">
      <header class="topbar glass">
        <div><b>超級百貨 Online</b><small id="roomCodeText">房號：----</small></div>
        <button id="soundBtn" class="mini">🎵</button>
      </header>

      <section class="players" id="playersPanel"></section>

      <section class="board-wrap glass">
        <div id="board" class="board"></div>
        <div class="center-panel">
          <div class="dice" id="dice">🎲</div>
          <div id="turnText">等待玩家...</div>
          <button id="startBtn">開始遊戲 / AI補位</button>
          <button id="rollBtn" disabled>擲骰</button>
          <button id="buildBtn" disabled>建店 / 升級</button>
          <button id="endBtn" disabled>結束回合</button>
        </div>
      </section>

      <section class="glass event-box">
        <h3>事件紀錄</h3>
        <div id="logPanel"></div>
      </section>
    </section>

    <dialog id="modal">
      <div id="modalContent"></div>
      <button id="closeModal">關閉</button>
    </dialog>
  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
